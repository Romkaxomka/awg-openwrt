name: Build AmneziaWG for FriendlyWrt RK3568

on:
  workflow_dispatch:
    inputs:
      expected_vermagic:
        description: "Expected kernel vermagic from apk info kernel"
        required: true
        default: "4e4117109c72fb4bff0e116d4c7a18f6"

jobs:
  build:
    name: "FriendlyWrt 25.12 rk3568 AmneziaWG"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Actions-FriendlyWrt helpers
        uses: actions/checkout@v4
        with:
          repository: friendlyarm/Actions-FriendlyWrt
          ref: master

      - name: Init build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d
          wget https://raw.githubusercontent.com/friendlyarm/build-env-on-ubuntu-bionic/master/install.sh
          sed -i -e 's/^apt-get -y install openjdk-8-jdk/# apt-get -y install openjdk-8-jdk/g' install.sh
          sed -i -e 's/^\[ -d fa-toolchain \]/# [ -d fa-toolchain ]/g' install.sh
          sed -i -e 's/^(cat fa-toolchain/# (cat fa-toolchain/g' install.sh
          sed -i -e 's/^(tar xf fa-toolchain/# (tar xf fa-toolchain/g' install.sh
          sudo -E bash ./install.sh

          sudo apt update
          sudo apt install -y python3-pyelftools python3-dev python3-setuptools python3-pip ccache

          git config --global user.name "GitHub Actions"
          git config --global user.email "noreply@github.com"
          git config --global color.ui false

          git clone https://github.com/friendlyarm/repo
          sudo -E cp repo/repo /usr/bin/

          sudo swapoff -a || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk /usr/local/share/boost /opt/ghc 2>/dev/null || true

      - name: Download FriendlyWrt source
        run: |
          mkdir project
          cd project

          repo init --depth=1 \
            -u https://github.com/friendlyarm/friendlywrt_manifests \
            -b master-v25.12 \
            -m rk3568.xml \
            --repo-url=https://github.com/friendlyarm/repo \
            --no-clone-bundle

          repo sync -c friendlywrt --no-clone-bundle
          repo sync -c kernel --no-clone-bundle
          repo sync -c u-boot --no-clone-bundle
          repo sync -c rkbin --no-clone-bundle
          repo sync -c configs --no-clone-bundle
          repo sync -c device/common --no-clone-bundle
          repo sync -c device/friendlyelec --no-clone-bundle
          repo sync -c scripts --no-clone-bundle
          repo sync -c scripts/sd-fuse --no-clone-bundle
          repo sync -c toolchain --no-clone-bundle

      - name: Add AmneziaWG feed
        run: |
          cd project

          source ../scripts/add_packages.sh || true
          source ../scripts/custome_config.sh || true

          FRIENDLYWRT_SRC="$(find . -maxdepth 2 -type d -name friendlywrt | head -n1)"

          if [ -z "$FRIENDLYWRT_SRC" ]; then
            echo "Cannot find friendlywrt source directory"
            find . -maxdepth 3 -type d
            exit 1
          fi

          echo "FRIENDLYWRT_SRC=$FRIENDLYWRT_SRC" >> "$GITHUB_ENV"

          cd "$FRIENDLYWRT_SRC"

          echo "src-git awgopenwrt https://github.com/this-username-has-been-taken/amneziawg-openwrt.git" >> feeds.conf.default

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure FriendlyWrt
        run: |
          cd project

          cat > .current_config.mk <<'EOF'
          CONFIG=rockchip
          EOF

          ./build.sh nanopi_r5s.mk || true

          cd "$FRIENDLYWRT_SRC"

          cat >> .config <<'EOF'
          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=m
          CONFIG_PACKAGE_luci-proto-amneziawg=m
          CONFIG_PACKAGE_kmod-crypto-lib-chacha20=m
          CONFIG_PACKAGE_kmod-crypto-lib-chacha20poly1305=m
          CONFIG_PACKAGE_kmod-crypto-lib-curve25519=m
          CONFIG_PACKAGE_kmod-udptunnel4=m
          CONFIG_PACKAGE_kmod-udptunnel6=m
          EOF

          make defconfig

      - name: Build tools and kernel
        run: |
          cd project

          ./build.sh kernel

          cd "$FRIENDLYWRT_SRC"

          VERMAGIC="$(cat build_dir/target-*/linux-*/linux-*/.vermagic)"
          echo "Actual vermagic: ${VERMAGIC}"
          echo "Expected vermagic: ${{ inputs.expected_vermagic }}"

          if [ "${VERMAGIC}" != "${{ inputs.expected_vermagic }}" ]; then
            echo "::error::Vermagic mismatch: ${VERMAGIC}, expected ${{ inputs.expected_vermagic }}"
            exit 1
          fi

      - name: Build AmneziaWG packages
        run: |
          cd "$FRIENDLYWRT_SRC"

          make package/feeds/awgopenwrt/kmod-amneziawg/{clean,compile} -j"$(nproc)" V=s
          make package/feeds/awgopenwrt/amneziawg-tools/{clean,compile} -j"$(nproc)" V=s
          make package/feeds/awgopenwrt/luci-proto-amneziawg/{clean,compile} -j"$(nproc)" V=s

      - name: Prepare artifacts
        run: |
          cd "$FRIENDLYWRT_SRC"

          mkdir -p "$GITHUB_WORKSPACE/artifacts"

          VERMAGIC="$(cat build_dir/target-*/linux-*/linux-*/.vermagic)"
          echo "${VERMAGIC}" > "$GITHUB_WORKSPACE/artifacts/vermagic.txt"

          find bin -type f \( \
            -name "kmod-amneziawg*.apk" -o \
            -name "amneziawg-tools*.apk" -o \
            -name "luci-proto-amneziawg*.apk" \
          \) -print -exec cp {} "$GITHUB_WORKSPACE/artifacts/" \;

          find "$GITHUB_WORKSPACE/artifacts" -type f -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-friendlywrt-rk3568
          path: artifacts/*
