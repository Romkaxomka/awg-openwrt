name: Build AmneziaWG for FriendlyWrt

on:
  workflow_dispatch:
    inputs:
      openwrt_tag:
        description: "OpenWrt tag"
        required: true
        default: "v25.12.2"
      target:
        description: "Target"
        required: true
        default: "rockchip"
      subtarget:
        description: "Subtarget"
        required: true
        default: "armv8"
      expected_vermagic:
        description: "Expected kernel vermagic"
        required: true
        default: "4e4117109c72fb4bff0e116d4c7a18f6"

jobs:
  build:
    name: "${{ inputs.openwrt_tag }} ${{ inputs.target }}/${{ inputs.subtarget }}"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ inputs.openwrt_tag }}
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-dev python3-setuptools \
            python3-pyelftools rsync swig unzip zlib1g-dev file wget curl python3 \
            libelf-dev patch perl make ccache ecj fastjar java-propose-classpath

      - name: Add feeds
        run: |
          RELEASE="${{ inputs.openwrt_tag }}"
          RELEASE="${RELEASE#v}"

          wget "https://downloads.openwrt.org/releases/${RELEASE}/targets/${{ inputs.target }}/${{ inputs.subtarget }}/feeds.buildinfo" -O feeds.conf.default

          echo "src-git awgopenwrt https://github.com/this-username-has-been-taken/amneziawg-openwrt.git" >> feeds.conf.default

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare config
        run: |
          RELEASE="${{ inputs.openwrt_tag }}"
          RELEASE="${RELEASE#v}"

          wget "https://downloads.openwrt.org/releases/${RELEASE}/targets/${{ inputs.target }}/${{ inputs.subtarget }}/config.buildinfo" -O .config

          cat >> .config <<'EOF'
          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=m
          CONFIG_PACKAGE_luci-proto-amneziawg=m
          CONFIG_PACKAGE_kmod-crypto-lib-chacha20=m
          CONFIG_PACKAGE_kmod-crypto-lib-chacha20poly1305=m
          CONFIG_PACKAGE_kmod-crypto-lib-curve25519=m
          CONFIG_PACKAGE_kmod-udptunnel4=m
          CONFIG_PACKAGE_kmod-udptunnel6=m
          EOF

          make defconfig

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            dl
            staging_dir
            build_dir
            tmp
          key: friendlywrt-amneziawg-${{ inputs.openwrt_tag }}-${{ inputs.target }}-${{ inputs.subtarget }}-${{ inputs.expected_vermagic }}-${{ hashFiles('.config', 'feeds.conf.default') }}
          restore-keys: |
            friendlywrt-amneziawg-${{ inputs.openwrt_tag }}-${{ inputs.target }}-${{ inputs.subtarget }}-

      - name: Build tools and toolchain
        run: |
          make tools/install -j"$(nproc)" V=s
          make toolchain/install -j"$(nproc)" V=s

      - name: Build kernel
        run: |
          make target/linux/compile -j"$(nproc)" V=s

          VERMAGIC="$(cat build_dir/target-*/linux-${{ inputs.target }}_${{ inputs.subtarget }}/linux-*/.vermagic)"
          echo "Actual vermagic: ${VERMAGIC}"
          echo "Expected vermagic: ${{ inputs.expected_vermagic }}"

          if [ "${VERMAGIC}" != "${{ inputs.expected_vermagic }}" ]; then
            echo "VERMAGIC_MISMATCH=1" >> "$GITHUB_ENV"
            echo "::error::Vermagic mismatch: ${VERMAGIC}, expected ${{ inputs.expected_vermagic }}"
            exit 1
          fi

      - name: Build AmneziaWG packages
        run: |
          make package/feeds/awgopenwrt/kmod-amneziawg/{clean,compile} -j"$(nproc)" V=s
          make package/feeds/awgopenwrt/amneziawg-tools/{clean,compile} -j"$(nproc)" V=s
          make package/feeds/awgopenwrt/luci-proto-amneziawg/{clean,compile} -j"$(nproc)" V=s

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts

          VERMAGIC="$(cat build_dir/target-*/linux-${{ inputs.target }}_${{ inputs.subtarget }}/linux-*/.vermagic)"
          echo "${VERMAGIC}" > artifacts/vermagic.txt

          find bin -type f \( \
            -name "kmod-amneziawg*.apk" -o \
            -name "amneziawg-tools*.apk" -o \
            -name "luci-proto-amneziawg*.apk" \
          \) -print -exec cp {} artifacts/ \;

          find artifacts -type f -maxdepth 1 -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-friendlywrt-${{ inputs.openwrt_tag }}-${{ inputs.target }}-${{ inputs.subtarget }}
          path: artifacts/*
